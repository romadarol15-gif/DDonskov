<!DOCTYPE html>
<html lang="ru" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>Вход</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex align-items-center py-4 bg-body-tertiary" style="height: 100vh;">
    <main class="form-signin w-100 m-auto" style="max-width: 330px;">
        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}
            <h1 class="h3 mb-3 fw-normal text-center">Вход в CRM</h1>
            
            {% if form.errors %}
            <div class="alert alert-danger" role="alert">
                Неверный логин или пароль.
            </div>
            {% endif %}

            <div class="form-floating mb-2">
                <input type="text" name="username" class="form-control" id="floatingInput" placeholder="Логин" required>
                <label for="floatingInput">Логин</label>
            </div>
            <div class="form-floating mb-3">
                <input type="password" name="password" class="form-control" id="floatingPassword" placeholder="Пароль" required>
                <label for="floatingPassword">Пароль</label>
            </div>
            
            {% if next %}
                <input type="hidden" name="next" value="{{ next }}">
            {% endif %}

            <button class="btn btn-primary w-100 py-2" type="submit">Войти</button>
            <div class="mt-3 text-center">
                <small class="text-muted">
                    <b>Тестовые аккаунты (пароль 123):</b><br>
                    admin (Суперюзер)<br>
                    director (Руководитель)<br>
                    manager (Менеджер)<br>
                    emp1, emp2, emp3 (Сотрудники)
                </small>
            </div>
        </form>
    </main>
</body>
</html>
