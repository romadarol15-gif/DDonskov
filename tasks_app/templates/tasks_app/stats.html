{% extends 'tasks_app/base.html' %}
{% block content %}
<h2>Статистика</h2>
<div class="row mt-4">
    <div class="col-md-6">
        <h4 class="mb-3">Статусы задач</h4>
        <canvas id="statusChart"></canvas>
    </div>
    <div class="col-md-6">
        <h4 class="mb-3">Типы оборудования</h4>
        <canvas id="equipChart"></canvas>
    </div>
</div>
<div class="row mt-5">
    <div class="col-md-12">
        <h4>Задачи сотрудников</h4>
        <table class="table table-bordered mt-3">
            <thead class="table-dark">
                <tr><th>Сотрудник</th><th>Количество привязанных задач</th></tr>
            </thead>
            <tbody>
                {% for emp in employee_stats %}
                <tr><td>{{ emp.username }}</td><td>{{ emp.task_count }}</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
<script>
    const statusData = {{ status_counts|safe }};
    const equipData = {{ equip_counts|safe }};
    
    // График статусов
    new Chart(document.getElementById('statusChart'), {
        type: 'pie',
        data: {
            labels: statusData.map(d => d.status),
            datasets: [{ 
                data: statusData.map(d => d.count), 
                backgroundColor: ['#ff9999','#66b3ff','#99ff99','#ffcc99','#c2c2f0','#ffb3e6'],
                borderWidth: 1
            }]
        },
        options: { plugins: { legend: { labels: { color: 'white' } } } }
    });

    // График типов оборудования
    new Chart(document.getElementById('equipChart'), {
        type: 'bar',
        data: {
            labels: equipData.map(d => d.equipment_type),
            datasets: [{ 
                label: 'Количество задач', 
                data: equipData.map(d => d.count), 
                backgroundColor: '#36a2eb' 
            }]
        },
        options: { 
            plugins: { legend: { labels: { color: 'white' } } },
            scales: {
                y: { ticks: { color: 'white' }, beginAtZero: true },
                x: { ticks: { color: 'white' } }
            }
        }
    });
</script>
{% endblock %}
