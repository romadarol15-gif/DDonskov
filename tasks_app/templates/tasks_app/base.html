<!DOCTYPE html>
<html lang="ru" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>CRM Система</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">CRM System</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Дашборд</a></li>
                    {% if user.role == 'superuser' or user.role == 'director' or user.role == 'manager' %}
                    <li class="nav-item"><a class="nav-link" href="/stats/">Статистика</a></li>
                    {% endif %}
                </ul>
                <span class="navbar-text me-3">Вы вошли как: {{ user.username }} ({{ user.get_role_display }})</span>
                <form method="post" action="{% url 'logout' %}">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-outline-light btn-sm">Выйти</button>
                </form>
            </div>
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
