{% extends 'tasks_app/base.html' %}
{% block content %}
<div class="mb-3">
    <a href="/" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left"></i> Назад к списку</a>
</div>
<div class="card bg-dark border-secondary" style="max-width: 800px; margin: 0 auto;">
    <div class="card-header bg-primary text-white">
        <h4 class="mb-0"><i class="bi bi-plus-circle"></i> {{ title }}</h4>
    </div>
    <div class="card-body">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}
            <hr class="border-secondary">
            <div class="text-end">
                <button type="submit" class="btn btn-success"><i class="bi bi-check-lg"></i> Сохранить</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
