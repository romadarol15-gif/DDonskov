{% extends 'tasks_app/base.html' %}
{% block content %}
<div class="card bg-dark border-secondary" style="max-width: 600px; margin: 0 auto;">
    <div class="card-header bg-secondary bg-opacity-25">
        <h4 class="mb-0"><i class="bi bi-person-badge"></i> Мой профиль</h4>
    </div>
    <div class="card-body text-center mb-4">
        <i class="bi bi-person-circle display-1 text-secondary"></i>
        <h3 class="mt-2">{{ user.username }}</h3>
        <span class="badge bg-info text-dark fs-6">{{ user.get_role_display }}</span>
    </div>
    <div class="card-body border-top border-secondary">
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="text-end mt-4">
                <button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> Обновить данные</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
