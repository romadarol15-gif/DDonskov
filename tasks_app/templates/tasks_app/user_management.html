{% extends 'tasks_app/base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold"><i class="bi bi-people-fill text-primary"></i> Сотрудники компании</h2>
    <a href="{% url 'user_create' %}" class="btn btn-primary px-4 rounded-pill"><i class="bi bi-person-plus"></i> Добавить</a>
</div>

<div class="card overflow-hidden">
    <div class="table-responsive">
        <table class="table table-hover mb-0 align-middle">
            <thead class="table-light">
                <tr>
                    <th class="ps-4">Логин</th>
                    <th>ФИО</th>
                    <th>Роль</th>
                    <th>Email</th>
                    <th class="text-end pe-4">Действия</th>
                </tr>
            </thead>
            <tbody>
                {% for u in users %}
                <tr>
                    <td class="ps-4">
                        <div class="d-flex align-items-center">
                            <i class="bi bi-person-circle fs-4 me-3 {% if u.is_superuser %}text-danger{% elif u.role == 'director' %}text-warning{% else %}text-secondary{% endif %}"></i>
                            <strong>{{ u.username }}</strong>
                        </div>
                    </td>
                    <td>{{ u.first_name }} {{ u.last_name }}</td>
                    <td><span class="badge bg-secondary">{{ u.get_role_display }}</span></td>
                    <td><a href="mailto:{{ u.email }}" class="text-body text-decoration-none">{{ u.email }}</a></td>
                    <td class="text-end pe-4">
                        <a href="{% url 'user_edit' u.pk %}" class="btn btn-sm btn-outline-info rounded-pill px-3 me-2"><i class="bi bi-pencil"></i></a>
                        {% if user.pk != u.pk %}
                        <a href="{% url 'user_delete' u.pk %}" class="btn btn-sm btn-outline-danger rounded-pill px-3" onclick="return confirm('Удалить пользователя?');"><i class="bi bi-trash"></i></a>
                        {% endif %}
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
